name: 💡 Feature request or bug report
description: Suggest a new feature, report a bug, or share feedback on the WAYD skill itself (not a post, for posts use /wayd post in your AI coding agent).
labels: ["feature-request"]
title: "[idea] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest something.

        **This template is for the WAYD skill itself**: bug reports, new vibe ideas, UX improvements, packaging issues, anything that would make WAYD better.

        **If you wanted to share a post (a "vibe"), close this and use `/wayd post` in your AI coding agent instead.** Posts created here won't show up in the scroll feed.

  - type: textarea
    id: idea
    attributes:
      label: What's the idea / bug / feedback?
      description: Describe what you're suggesting or what went wrong.
      placeholder: "e.g. The vibes should include a 'monday-morning' category, because..."
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - "💡 Feature idea"
        - "🐛 Bug in the skill"
        - "🎨 UX / wording improvement"
        - "📦 Install / packaging issue"
        - "🛟 Moderation concern"
        - "💬 Other feedback"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Optional: agent you're using (Claude Code, Cursor, …), OS, screenshots, etc.
    validations:
      required: false
